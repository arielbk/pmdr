name: pmdr-menubar
options:
  bundleIdPrefix: dev.pmdr
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

targets:
  PmdrMenubarCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/PmdrMenubarCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pmdr.menubar.core
        PRODUCT_NAME: PmdrMenubarCore
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks @loader_path/Frameworks"

  pmdr-menubar:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "PmdrMenubarCore/**"
    dependencies:
      - target: PmdrMenubarCore
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pmdr.menubar
        PRODUCT_NAME: pmdr
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"

  pmdr-menubarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PmdrMenubarCoreTests
    dependencies:
      - target: pmdr-menubar
      - target: PmdrMenubarCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pmdr.menubarTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/pmdr.app/Contents/MacOS/pmdr
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks @loader_path/../Frameworks @loader_path/../../../../Frameworks"

schemes:
  pmdr-menubar:
    build:
      targets:
        pmdr-menubar: all
    test:
      targets:
        - pmdr-menubarTests
