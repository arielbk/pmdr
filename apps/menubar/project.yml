name: pmdr-menubar
options:
  bundleIdPrefix: dev.pmdr
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

targets:
  pmdr-menubar:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pmdr.menubar
        PRODUCT_NAME: pmdr
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  pmdr-menubarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PmdrMenubarCoreTests
    dependencies:
      - target: pmdr-menubar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.pmdr.menubarTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/pmdr.app/Contents/MacOS/pmdr

schemes:
  pmdr-menubar:
    build:
      targets:
        pmdr-menubar: all
    test:
      targets:
        - pmdr-menubarTests
